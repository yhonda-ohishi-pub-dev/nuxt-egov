name: CI

on:
  pull_request:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'nuxt'
      install_command: 'npm install'
      has_tests: false
      has_deploy: true
      npm_scope: '@ippoan'
      post_install_script: 'rm -rf node_modules/.cache .nuxt && npx nuxt prepare'
    secrets: inherit

  dev-proxy:
    uses: ippoan/ci-workflows/.github/workflows/dev-proxy-validate.yml@main
