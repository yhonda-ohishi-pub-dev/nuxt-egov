name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx nuxt generate
        env:
          NUXT_PUBLIC_EGOV_CLIENT_ID: ${{ secrets.EGOV_CLIENT_ID }}
          NUXT_PUBLIC_EGOV_REDIRECT_URI: ${{ secrets.EGOV_REDIRECT_URI }}
          NUXT_PUBLIC_EGOV_AUTH_BASE: ${{ secrets.EGOV_AUTH_BASE }}
          NUXT_PUBLIC_EGOV_API_BASE: ${{ secrets.EGOV_API_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
